<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Базові стилі (для мобільних) */
        body { background: #000; color: #4CAF50; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .game-area { width: 90vw; height: 70vh; border: 2px solid #4CAF50; position: relative; }
        
        /* Адаптивність для ПК та консолей (широкі екрани) */
        @media (min-width: 768px) {
            .game-area { width: 600px; height: 400px; }
            h1 { font-size: 3em; }
        }

        .frog { font-size: 50px; position: absolute; transition: 0.2s; cursor: pointer; }
        #clicker { display: none; }
        #clicker:checked ~ .frog { display: none; }
    </style>
</head>
<body>

    <h1>JabaScript Game</h1>
    <div class="game-area">
        <input type="checkbox" id="clicker">
        <label for="clicker" class="frog" style="top: 30%; left: 30%;">(`-')</label>
    </div>

</body>
</html>
